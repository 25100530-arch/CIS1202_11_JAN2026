<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Home — John Carl E. Bautista</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-top">
      <div class="header-content">
        <h1>JOHN CARL E. BAUTISTA</h1>
        <p>Web developer • Designer • Student</p>
      </div>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
        <span class="sun-icon">☀️</span>
        <span class="moon-icon">🌙</span>
      </button>
    </div>
    <nav aria-label="Primary">
      <ul>
        <li><a href="website.html" title="Home">Home</a></li>
        <li><a href="about.html" title="About">About Me</a></li>
        <li><a href="projects.html" title="Projects">Projects</a></li>
        <li><a href="contact.html" title="Contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="home" aria-labelledby="home-heading">
      <h2 id="home-heading">Welcome</h2>
      <p>Welcome to my portfolio website. Explore my work and get in touch!</p>
    </section>
  </main>

  <footer>
    <p>&copy; <span id="year">2026</span> John Carl E. Bautista. All rights reserved.</p>
  </footer>

  <script>
    // Dark mode toggle functionality
    const themeToggle = document.getElementById('theme-toggle');
    const htmlElement = document.documentElement;
    
    // Check for saved theme preference or default to light mode
    const savedTheme = localStorage.getItem('theme') || 'light';
    htmlElement.setAttribute('data-theme', savedTheme);
    
    // Toggle theme on button click
    themeToggle.addEventListener('click', () => {
      const currentTheme = htmlElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      htmlElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });

    // Set current year
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
